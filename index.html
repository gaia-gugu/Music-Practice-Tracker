<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Music Practice Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
    :root {
      --bg: #fdf6ff;
      --panel: #ffffff;
      --text: #2d1b69;
      --muted: #8b7ab8;
      --line: #e8d5f5;
      --accent: #7c3aed;
      --accent-soft: #ede9fe;
      --success: #065f46;
      --success-bg: #d1fae5;
      --danger: #9f1239;
      --danger-bg: #ffe4e6;
      --shadow: 0 8px 24px rgba(124, 58, 237, 0.10);
      --radius: 20px;
      --tap: 68px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 40px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .topbar {
      display: grid;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      padding-bottom: 10px;
    }

    .summary {
      padding: 16px;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 1.6rem;
      font-weight: 900;
      line-height: 1.2;
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .small {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .mode-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 600;
      background: var(--accent-soft);
      color: var(--text);
      cursor: pointer;
      min-height: 52px;
    }

    .btn:active {
      transform: scale(0.99);
    }

    .btn.primary {
      background: var(--accent);
      color: white;
    }

    .btn.ghost {
      background: white;
      border: 1px solid var(--line);
    }

    .btn.danger {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .btn.success {
      background: var(--success-bg);
      color: var(--success);
    }

    .hidden {
      display: none !important;
    }

    .progress-wrap {
      margin-top: 12px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .progress-bar {
      width: 100%;
      height: 16px;
      background: #ede9fe;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      transition: width 0.2s ease;
    }

    .section-list {
      display: grid;
      gap: 14px;
      margin-top: 16px;
    }

    .section-card {
      padding: 16px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .section-title {
      font-size: 1.2rem;
      font-weight: 800;
      line-height: 1.3;
      color: var(--text);
    }

    .section-meta {
      margin-top: 6px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .done-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      height: 40px;
      border-radius: 999px;
      background: var(--success-bg);
      color: var(--success);
      font-size: 1.2rem;
      font-weight: 700;
      border: 1px solid #bbf7d0;
    }

    .counter-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-top: 14px;
    }

    .count-display {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      color: var(--accent);
    }

    .tap-controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .tap-btn {
      border: none;
      border-radius: 18px;
      cursor: pointer;
      font-weight: 800;
      box-shadow: var(--shadow);
      touch-action: manipulation;
    }

    .tap-btn.plus {
      min-width: 104px;
      min-height: 84px;
      padding: 0 24px;
      font-size: 2rem;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: white;
      border-radius: 22px;
    }

    .tap-btn.minus {
      min-width: 68px;
      min-height: 68px;
      font-size: 1.5rem;
      background: white;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .edit-panel {
      margin-top: 16px;
      padding: 16px;
    }

    .edit-grid {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 0.95rem;
      font-weight: 600;
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      font-size: 1rem;
      background: white;
      color: var(--text);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .add-row {
      display: grid;
      grid-template-columns: 1fr 140px auto;
      gap: 10px;
    }

    .edit-item {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fdf6ff;
      display: grid;
      gap: 10px;
    }

    .edit-item-row {
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 10px;
    }

    .edit-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      margin-top: 16px;
      font-size: 0.9rem;
    }

    .lock-note {
      font-size: 0.92rem;
      color: var(--muted);
      margin-top: 6px;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 700px) {
      .add-row,
      .edit-item-row,
      .counter-row {
        grid-template-columns: 1fr;
      }

      .tap-controls {
        justify-content: flex-start;
      }

      .tap-btn.plus {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="card summary">
        <div class="title-row">
          <div>
            <h1>Weekly Music Practice Tracker</h1>
            <div class="small" id="saveStatus">Saved automatically on this iPad</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn ghost" id="newDayBtn">🌅 New Day</button>
            <button class="btn danger" id="newWeekBtn">Start New Week</button>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-label">
            <span id="overallLabel">0 of 0 reps completed</span>
            <span id="overallPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="overallFill"></div>
          </div>
        </div>

      </div>
    </div>

    <div class="card summary" style="margin-top:0;">
      <div class="mode-row" style="padding: 14px 16px 10px;">
        <button class="btn primary" id="practiceModeBtn">Child Practice Mode</button>
        <button class="btn ghost" id="editModeBtn">Parent Edit Mode</button>
        <button class="btn ghost" id="toggleLockBtn">Lock Edit Mode</button>
      </div>
      <div class="lock-note" style="padding: 0 16px 14px;" id="lockNote">Edit mode is unlocked.</div>
    </div>

    <div id="editPanel" class="card edit-panel hidden">
      <div class="edit-grid">
        <div class="field">
          <label for="pasteBox">Paste weekly list</label>
          <textarea id="pasteBox" placeholder="Example:
Opening phrase - 10
Bars 12 to 16 - 8
Fast passage - 12
Ending - 6"></textarea>
        </div>
        <div>
          <button class="btn primary" id="pasteApplyBtn">Use Pasted List</button>
        </div>

        <hr style="border:none;border-top:1px solid var(--line);width:100%;margin:4px 0;" />

        <div class="field">
          <label>Add one item</label>
          <div class="add-row">
            <input id="newName" type="text" placeholder="Section name" />
            <input id="newTarget" type="number" min="1" step="1" placeholder="Target" />
            <button class="btn primary" id="addItemBtn">Add</button>
          </div>
        </div>

        <div id="editList"></div>
      </div>
    </div>

    <div id="practicePanel">
      <div class="section-list" id="practiceList"></div>
      <div class="card empty hidden" id="emptyState">
        No practice items yet. Open Parent Edit Mode to add this week's list.
      </div>
    </div>

    <div class="footer-note">Tap counts save automatically.</div>
  </div>

  <script>
    const STORAGE_KEY = "music_practice_tracker_v1";

    const defaultState = {
      mode: "practice",
      editLocked: false,
      items: [
        { id: crypto.randomUUID(), name: "Opening phrase", target: 10, count: 0 },
        { id: crypto.randomUUID(), name: "Bars 12 to 16", target: 8, count: 0 },
        { id: crypto.randomUUID(), name: "Fast passage", target: 12, count: 0 },
        { id: crypto.randomUUID(), name: "Ending", target: 6, count: 0 }
      ]
    };

    let state = loadState();

    const saveStatus = document.getElementById("saveStatus");
    const overallLabel = document.getElementById("overallLabel");
    const overallPercent = document.getElementById("overallPercent");
    const overallFill = document.getElementById("overallFill");
    const practiceModeBtn = document.getElementById("practiceModeBtn");
    const editModeBtn = document.getElementById("editModeBtn");
    const toggleLockBtn = document.getElementById("toggleLockBtn");
    const lockNote = document.getElementById("lockNote");
    const newWeekBtn = document.getElementById("newWeekBtn");
    const editPanel = document.getElementById("editPanel");
    const practicePanel = document.getElementById("practicePanel");
    const practiceList = document.getElementById("practiceList");
    const editList = document.getElementById("editList");
    const emptyState = document.getElementById("emptyState");
    const pasteBox = document.getElementById("pasteBox");
    const pasteApplyBtn = document.getElementById("pasteApplyBtn");
    const newName = document.getElementById("newName");
    const newTarget = document.getElementById("newTarget");
    const addItemBtn = document.getElementById("addItemBtn");

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return structuredClone(defaultState);
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.items)) return structuredClone(defaultState);

        return {
          mode: parsed.mode === "edit" ? "edit" : "practice",
          editLocked: !!parsed.editLocked,
          items: parsed.items.map(item => ({
            id: item.id || crypto.randomUUID(),
            name: String(item.name || "").trim() || "Untitled section",
            target: Math.max(1, Number(item.target) || 1),
            count: Math.max(0, Number(item.count) || 0)
          }))
        };
      } catch {
        return structuredClone(defaultState);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      const now = new Date();
      saveStatus.textContent = "Saved automatically • " + now.toLocaleTimeString([], {
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function setMode(mode) {
      if (mode === "edit" && state.editLocked) return;
      state.mode = mode;
      saveState();
      render();
    }

    function toggleLock() {
      state.editLocked = !state.editLocked;
      if (state.editLocked && state.mode === "edit") {
        state.mode = "practice";
      }
      saveState();
      render();
    }

    function updateCount(id, delta) {
      const item = state.items.find(x => x.id === id);
      if (!item) return;
      item.count = Math.max(0, item.count + delta);
      saveState();
      render();
    }

    function deleteItem(id) {
      state.items = state.items.filter(x => x.id !== id);
      saveState();
      render();
    }

    function moveItem(id, direction) {
      const index = state.items.findIndex(x => x.id === id);
      if (index < 0) return;
      const nextIndex = index + direction;
      if (nextIndex < 0 || nextIndex >= state.items.length) return;
      [state.items[index], state.items[nextIndex]] = [state.items[nextIndex], state.items[index]];
      saveState();
      render();
    }

    function addItem() {
      const name = newName.value.trim();
      const target = Number(newTarget.value);
      if (!name || !Number.isFinite(target) || target < 1) return;

      state.items.push({
        id: crypto.randomUUID(),
        name,
        target: Math.floor(target),
        count: 0
      });

      newName.value = "";
      newTarget.value = "";
      saveState();
      render();
    }

    function applyPastedList() {
      const lines = pasteBox.value
        .split("\n")
        .map(line => line.trim())
        .filter(Boolean);

      const parsed = [];

      for (const line of lines) {
        const match = line.trim().match(/^(.*\S)\s+-\s*(\d+)$/);
        if (!match) continue;

        const name = match[1].trim();
        const target = Number(match[2]);

        if (name && target >= 1) {
          parsed.push({
            id: crypto.randomUUID(),
            name,
            target,
            count: 0
          });
        }
      }

      if (parsed.length === 0) {
        alert("Please paste lines in this format: Section name - number");
        return;
      }

      const confirmReplace = confirm("Replace the current weekly list with the pasted list?");
      if (!confirmReplace) return;

      state.items = parsed;
      pasteBox.value = "";
      saveState();
      render();
    }

    function startNewDay() {
      const ok = confirm("Reset all counts for a new day? Your list will stay the same.");
      if (!ok) return;
      state.items.forEach(item => item.count = 0);
      saveState();
      render();
    }

    function startNewWeek() {
      const ok = confirm("Start a new week? This will clear the current list and all counts.");
      if (!ok) return;

      state.items = [];
      state.mode = "edit";
      saveState();
      render();
    }

    function updateItemField(id, field, value) {
      const item = state.items.find(x => x.id === id);
      if (!item) return;

      if (field === "name") {
        item.name = value.trim() || "Untitled section";
      }

      if (field === "target") {
        item.target = Math.max(1, Math.floor(Number(value) || 1));
        if (item.count < 0) item.count = 0;
      }

      saveState();
      render();
    }

    function renderPracticeList() {
      practiceList.innerHTML = "";

      if (state.items.length === 0) {
        emptyState.classList.remove("hidden");
        return;
      }

      emptyState.classList.add("hidden");

      for (const item of state.items) {
        const pct = Math.min(100, Math.round((item.count / item.target) * 100));
        const done = item.count >= item.target;

        const card = document.createElement("div");
        card.className = "card section-card";

        card.innerHTML = `
          <div class="section-head">
            <div>
              <div class="section-title">${escapeHtml(item.name)}</div>
              <div class="section-meta">Target: ${item.target} reps</div>
            </div>
            ${done ? `<div class="done-badge">✓</div>` : ``}
          </div>

          <div class="counter-row">
            <div>
              <div class="count-display">${item.count} / ${item.target}</div>
              <div class="progress-wrap">
                <div class="progress-bar">
                  <div class="progress-fill" style="width:${pct}%"></div>
                </div>
              </div>
            </div>

            <div class="tap-controls">
              <button class="tap-btn minus" data-action="minus" data-id="${item.id}" aria-label="Minus one">−</button>
              <button class="tap-btn plus" data-action="plus" data-id="${item.id}" aria-label="Plus one">+1</button>
            </div>
          </div>
        `;

        practiceList.appendChild(card);
      }

      practiceList.querySelectorAll("[data-action='plus']").forEach(btn => {
        btn.addEventListener("click", () => updateCount(btn.dataset.id, 1));
      });

      practiceList.querySelectorAll("[data-action='minus']").forEach(btn => {
        btn.addEventListener("click", () => updateCount(btn.dataset.id, -1));
      });
    }

    function renderEditList() {
      editList.innerHTML = "";

      if (state.items.length === 0) {
        const note = document.createElement("div");
        note.className = "empty";
        note.textContent = "No items yet. Paste a list above or add one item below.";
        editList.appendChild(note);
        return;
      }

      state.items.forEach((item, index) => {
        const wrapper = document.createElement("div");
        wrapper.className = "edit-item";

        wrapper.innerHTML = `
          <div class="edit-item-row">
            <input type="text" value="${escapeAttr(item.name)}" aria-label="Section name" />
            <input type="number" min="1" step="1" value="${item.target}" aria-label="Target repetitions" />
          </div>
          <div class="small">Current count: ${item.count}</div>
          <div class="edit-actions">
            <button class="btn ghost" data-move="up">Move Up</button>
            <button class="btn ghost" data-move="down">Move Down</button>
            <button class="btn danger" data-delete="true">Delete</button>
          </div>
        `;

        const [nameInput, targetInput] = wrapper.querySelectorAll("input");
        nameInput.addEventListener("change", e => updateItemField(item.id, "name", e.target.value));
        targetInput.addEventListener("change", e => updateItemField(item.id, "target", e.target.value));

        wrapper.querySelector("[data-move='up']").addEventListener("click", () => moveItem(item.id, -1));
        wrapper.querySelector("[data-move='down']").addEventListener("click", () => moveItem(item.id, 1));
        wrapper.querySelector("[data-delete='true']").addEventListener("click", () => deleteItem(item.id));

        if (index === 0) {
          wrapper.querySelector("[data-move='up']").disabled = true;
        }
        if (index === state.items.length - 1) {
          wrapper.querySelector("[data-move='down']").disabled = true;
        }

        editList.appendChild(wrapper);
      });
    }

    function renderSummary() {
      const totalTarget = state.items.reduce((sum, item) => sum + item.target, 0);
      const totalDone = state.items.reduce((sum, item) => sum + Math.min(item.count, item.target), 0);
      const pct = totalTarget ? Math.round((totalDone / totalTarget) * 100) : 0;

      overallLabel.textContent = `${totalDone} of ${totalTarget} reps completed`;
      overallPercent.textContent = `${pct}%`;
      overallFill.style.width = `${pct}%`;
    }

    function renderMode() {
      const practiceMode = state.mode === "practice";

      practicePanel.classList.toggle("hidden", !practiceMode);
      editPanel.classList.toggle("hidden", practiceMode);

      practiceModeBtn.classList.toggle("primary", practiceMode);
      practiceModeBtn.classList.toggle("ghost", !practiceMode);

      editModeBtn.classList.toggle("primary", !practiceMode);
      editModeBtn.classList.toggle("ghost", practiceMode);

      editModeBtn.disabled = state.editLocked;
      toggleLockBtn.textContent = state.editLocked ? "Unlock Edit Mode" : "Lock Edit Mode";
      lockNote.textContent = state.editLocked
        ? "Edit mode is locked. Child can only use practice mode."
        : "Edit mode is unlocked.";
    }

    function render() {
      renderSummary();
      renderMode();
      renderPracticeList();
      renderEditList();
    }

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(str) {
      return escapeHtml(str);
    }

    document.getElementById("newDayBtn").addEventListener("click", startNewDay);
    practiceModeBtn.addEventListener("click", () => setMode("practice"));
    editModeBtn.addEventListener("click", () => setMode("edit"));
    toggleLockBtn.addEventListener("click", toggleLock);
    newWeekBtn.addEventListener("click", startNewWeek);
    pasteApplyBtn.addEventListener("click", applyPastedList);
    addItemBtn.addEventListener("click", addItem);

    newTarget.addEventListener("keydown", e => {
      if (e.key === "Enter") addItem();
    });

    newName.addEventListener("keydown", e => {
      if (e.key === "Enter") addItem();
    });

    render();
    saveState();
  </script>
</body>
</html>
