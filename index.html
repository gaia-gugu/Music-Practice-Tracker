<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Music Practice Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
    :root {
      --bg: #fdf6ff;
      --panel: #ffffff;
      --text: #2d1b69;
      --muted: #8b7ab8;
      --line: #e8d5f5;
      --accent: #7c3aed;
      --accent-soft: #ede9fe;
      --success: #065f46;
      --success-bg: #d1fae5;
      --danger: #9f1239;
      --danger-bg: #ffe4e6;
      --shadow: 0 8px 24px rgba(124, 58, 237, 0.10);
      --radius: 20px;
      --tap: 68px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 40px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .topbar {
      display: grid;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      padding-bottom: 10px;
    }

    .summary {
      padding: 16px;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 1.6rem;
      font-weight: 900;
      line-height: 1.2;
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .small {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .mode-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 600;
      background: var(--accent-soft);
      color: var(--text);
      cursor: pointer;
      min-height: 52px;
    }

    .btn:active {
      transform: scale(0.99);
    }

    .btn.primary {
      background: var(--accent);
      color: white;
    }

      background: white;
      border: 1px
